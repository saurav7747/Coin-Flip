<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Flip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #0f172a;
  font-family: 'Raleway', sans-serif;
  color: #f1f5f9;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 45% at 50% -5%, rgba(245,158,11,0.1) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 15% 95%, rgba(99,102,241,0.05) 0%, transparent 55%);
  pointer-events: none;
}

/* subtle grid */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding-bottom: 4rem;
  gap: 0;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
.eyebrow {
  font-size: 0.6rem; letter-spacing: 0.45em;
  text-transform: uppercase; color: #f59e0b;
  opacity: 0.7; margin-bottom: 0.45rem;
}
.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 4.5vw, 2.8rem);
  font-weight: 400; letter-spacing: 0.12em;
}

/* SCENE */
.scene {
  width: 210px; height: 210px;
  perspective: 700px;
  margin-bottom: 16px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.12s both;
}

.coin {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  will-change: transform;
}

/* FACES */
.face {
  position: absolute; inset: 0;
  border-radius: 50%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: visible;
}

/* HEAD — rich gold */
.face-h {
  background: conic-gradient(
    from 0deg,
    #78350f 0deg, #b45309 30deg, #f59e0b 60deg, #fde68a 90deg,
    #fef3c7 110deg, #fde68a 130deg, #f59e0b 160deg, #d97706 200deg,
    #b45309 240deg, #92400e 280deg, #78350f 320deg, #b45309 350deg, #78350f 360deg
  );
  box-shadow:
    inset 0 0 0 8px rgba(254,243,199,0.08),
    inset 0 4px 12px rgba(255,248,220,0.4),
    inset 0 -5px 14px rgba(78,28,5,0.6),
    0 0 0 8px #92400e,
    0 0 0 11px #78350f,
    0 0 0 14px #92400e,
    0 18px 50px rgba(0,0,0,0.7),
    0 0 40px rgba(245,158,11,0.08);
}

/* Radial shine overlay on head */
.face-h::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    rgba(255,252,220,0.45) 0%,
    rgba(255,220,100,0.15) 25%,
    transparent 55%
  );
}

/* Inner ring head */
.face-h::after {
  content: '';
  position: absolute; inset: 14px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,240,160,0.22);
  box-shadow:
    inset 0 0 8px rgba(255,240,160,0.06),
    0 0 0 1px rgba(92,40,10,0.3);
}

/* TAIL — silver */
.face-t {
  background: conic-gradient(
    from 0deg,
    #1e293b 0deg, #334155 30deg, #64748b 60deg, #94a3b8 90deg,
    #e2e8f0 110deg, #94a3b8 130deg, #64748b 160deg, #475569 200deg,
    #334155 240deg, #1e293b 280deg, #334155 320deg, #475569 350deg, #1e293b 360deg
  );
  box-shadow:
    inset 0 0 0 8px rgba(248,250,252,0.05),
    inset 0 4px 12px rgba(248,250,252,0.3),
    inset 0 -5px 14px rgba(15,23,42,0.7),
    0 0 0 8px #334155,
    0 0 0 11px #1e293b,
    0 0 0 14px #334155,
    0 18px 50px rgba(0,0,0,0.7),
    0 0 40px rgba(148,163,184,0.05);
  transform: rotateY(180deg);
}

.face-t::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    rgba(248,250,252,0.38) 0%,
    rgba(200,215,230,0.12) 25%,
    transparent 55%
  );
}

.face-t::after {
  content: '';
  position: absolute; inset: 14px;
  border-radius: 50%;
  border: 1.5px solid rgba(248,250,252,0.15);
  box-shadow:
    inset 0 0 8px rgba(248,250,252,0.04),
    0 0 0 1px rgba(15,23,42,0.4);
}

/* COIN CONTENT */
.coin-body {
  position: relative; z-index: 3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  pointer-events: none;
  user-select: none;
}

.emblem {
  line-height: 1;
  display: block;
}

/* HEAD content */
.face-h .emblem { font-size: 4rem; }
.face-h .word {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.4em;
  color: #78350f;
  text-shadow:
    0 1px 0 rgba(255,240,160,0.55),
    0 -1px 1px rgba(78,28,5,0.4);
}

/* TAIL content */
.face-t .emblem { font-size: 3.6rem; }
.face-t .word {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.4em;
  color: #1e293b;
  text-shadow:
    0 1px 0 rgba(248,250,252,0.45),
    0 -1px 1px rgba(15,23,42,0.4);
}

/* SHADOW */
.coin-shadow {
  width: 150px; height: 16px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 72%);
  border-radius: 50%;
  margin-bottom: 2.8rem;
  transition: opacity 0.2s;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.18s both;
}

/* RESULT */
.result-wrap {
  text-align: center;
  height: 56px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-bottom: 2.4rem;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s both;
}
.result-text {
  font-family: 'Cinzel', serif;
  font-size: 1.75rem; font-weight: 400;
  letter-spacing: 0.22em;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  color: #f59e0b;
}
.result-text.show { opacity: 1; transform: translateY(0); }
.result-text.gold  { color: #f59e0b; text-shadow: 0 0 25px rgba(245,158,11,0.4); }
.result-text.silver{ color: #94a3b8; text-shadow: 0 0 25px rgba(148,163,184,0.3); }
.result-sub {
  font-size: 0.56rem; letter-spacing: 0.32em;
  text-transform: uppercase; color: #475569;
  margin-top: 5px; opacity: 0;
  transition: opacity 0.4s 0.18s;
}
.result-text.show ~ .result-sub { opacity: 1; }

/* BUTTON */
.btn {
  position: relative;
  background: transparent;
  border: 1px solid rgba(245,158,11,0.38);
  color: #e2e8f0;
  font-family: 'Raleway', sans-serif;
  font-size: 0.67rem; font-weight: 500;
  letter-spacing: 0.32em; text-transform: uppercase;
  padding: 1rem 3.2rem;
  cursor: pointer; overflow: hidden;
  transition: border-color 0.3s, color 0.3s, transform 0.12s;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.32s both;
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(245,158,11,0.1), transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.btn:hover { border-color: rgba(245,158,11,0.75); color: #fde68a; }
.btn:hover::before { opacity: 1; }
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
/* sweep */
.btn::after {
  content: '';
  position: absolute; top: 0; left: -110%;
  width: 75%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(245,158,11,0.13), transparent);
  transform: skewX(-18deg);
  transition: left 0.55s ease;
}
.btn:hover::after { left: 145%; }

/* STATS */
.stats {
  position: fixed; top: 1.4rem; left: 1.4rem;
  display: flex; gap: 1.6rem;
  opacity: 0.25; pointer-events: none;
}
.stat { text-align: center; }
.stat-n {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 1.25rem; color: #f1f5f9; line-height: 1;
}
.stat-l {
  font-size: 0.48rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: #475569;
}

/* MODE TAG */
.mode-tag {
  position: fixed; top: 1.4rem; right: 1.4rem;
  font-size: 0.5rem; letter-spacing: 0.25em;
  text-transform: uppercase; color: #475569;
  padding: 0.28rem 0.6rem;
  border: 1px solid rgba(255,255,255,0.05);
  opacity: 0.38; pointer-events: none;
  transition: color 0.3s, opacity 0.3s;
}
.mode-tag.mh { color: #f59e0b; opacity: 0.6; }
.mode-tag.mt { color: #94a3b8; opacity: 0.55; }

/* DOTS */
.dots {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 9px; z-index: 10;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none; cursor: pointer; padding: 0;
  opacity: 0.28;
  transition: opacity 0.25s, transform 0.2s, background 0.25s;
}
.dot:hover { opacity: 0.7; transform: scale(1.5); }
.dot.ah { background: rgba(245,158,11,0.75); opacity: 0.65; }
.dot.at { background: rgba(148,163,184,0.65); opacity: 0.6; }
.dot.ar { background: rgba(255,255,255,0.32); opacity: 0.55; }

/* KEYFRAMES */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}

@media (max-width: 420px) {
  .scene { width: 175px; height: 175px; }
  .face-h .emblem { font-size: 3.2rem; }
  .face-t .emblem { font-size: 2.9rem; }
}
</style>
</head>
<body>

<div class="stats">
  <div class="stat"><span class="stat-n" id="sH">0</span><span class="stat-l">Heads</span></div>
  <div class="stat"><span class="stat-n" id="sT">0</span><span class="stat-l">Tails</span></div>
</div>
<div class="mode-tag" id="modeTag">Random</div>

<div class="app">

  <div class="header">
    <div class="eyebrow">The Toss</div>
    <div class="title">Coin Flip</div>
  </div>

  <div class="scene">
    <div class="coin" id="coin">
      <div class="face face-h">
        <div class="coin-body">
          <span class="emblem">👑</span>
          <span class="word">HEAD</span>
        </div>
      </div>
      <div class="face face-t">
        <div class="coin-body">
          <span class="emblem">⚜️</span>
          <span class="word">TAIL</span>
        </div>
      </div>
    </div>
  </div>

  <div class="coin-shadow" id="shadow"></div>

  <div class="result-wrap">
    <div class="result-text" id="rText"></div>
    <div class="result-sub">— result —</div>
  </div>

  <button class="btn" id="btnFlip">Flip the Coin</button>
</div>

<div class="dots">
  <button class="dot" id="dH"></button>
  <button class="dot" id="dT"></button>
  <button class="dot ar" id="dR"></button>
</div>

<script>
(function(){
  /* state */
  let mode = 'random';
  let busy = false;
  let deg  = 0;   // current rotateY accumulator
  let nH = 0, nT = 0;
  let rafId = null;

  /* refs */
  const coin    = document.getElementById('coin');
  const btn     = document.getElementById('btnFlip');
  const rText   = document.getElementById('rText');
  const shadow  = document.getElementById('shadow');
  const modeTag = document.getElementById('modeTag');
  const sH = document.getElementById('sH');
  const sT = document.getElementById('sT');
  const dH = document.getElementById('dH');
  const dT = document.getElementById('dT');
  const dR = document.getElementById('dR');

  /* apply initial transform */
  coin.style.transform = 'rotateY(0deg)';

  /* ── Audio ── */
  let actx = null;
  function getCtx(){
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    return actx;
  }
  function whoosh(){
    try{
      const c=getCtx(), t=c.currentTime;
      const b=c.createBuffer(1,c.sampleRate*0.55,c.sampleRate);
      const d=b.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const p=i/d.length;
        d[i]=(Math.random()*2-1)*Math.sin(Math.PI*p)*0.18;
      }
      const s=c.createBufferSource(); s.buffer=b;
      const f=c.createBiquadFilter(); f.type='bandpass';
      f.frequency.setValueAtTime(4500,t);
      f.frequency.exponentialRampToValueAtTime(500,t+0.55);
      f.Q.value=3.5;
      const g=c.createGain();
      g.gain.setValueAtTime(0.65,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
      s.connect(f);f.connect(g);g.connect(c.destination);
      s.start(t);
    }catch(e){}
  }
  function clink(){
    try{
      const c=getCtx(), t=c.currentTime;
      [0,0.011,0.026].forEach((dt,i)=>{
        const o=c.createOscillator(), g=c.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(2000-i*220,t+dt);
        o.frequency.exponentialRampToValueAtTime(450,t+dt+0.22);
        g.gain.setValueAtTime(0.28-i*0.06,t+dt);
        g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.24);
        o.connect(g);g.connect(c.destination);
        o.start(t+dt);o.stop(t+dt+0.26);
      });
    }catch(e){}
  }

  /* ── Mode ── */
  function setMode(m){
    mode=m;
    dH.className='dot'+(m==='head'?' ah':'');
    dT.className='dot'+(m==='tail'?' at':'');
    dR.className='dot'+(m==='random'?' ar':'');
    modeTag.textContent=m[0].toUpperCase()+m.slice(1);
    modeTag.className='mode-tag'+(m==='head'?' mh':m==='tail'?' mt':'');
  }
  dH.onclick=()=>setMode('head');
  dT.onclick=()=>setMode('tail');
  dR.onclick=()=>setMode('random');

  /* ── Easing ── */
  function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
  function easeOutBack(t){
    const c1=1.70158, c3=c1+1;
    return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
  }

  /* ── Flip ── */
  function flip(){
    if(busy) return;
    busy=true;
    btn.disabled=true;

    /* hide result */
    rText.className='result-text';
    rText.textContent='';

    const result = mode==='head' ? 'head' : mode==='tail' ? 'tail' : (Math.random()<0.5?'head':'tail');
    const spins  = 5 + Math.floor(Math.random()*4);   /* 5-8 full rotations */
    const dur    = 1300 + Math.floor(Math.random()*600); /* 1.3s – 1.9s */

    /* compute target degree */
    /* head = 0 mod 360, tail = 180 mod 360 */
    const base   = deg + spins * 360;
    const want   = result === 'head' ? 0 : 180;
    const rem    = ((base % 360) + 360) % 360;
    const diff   = ((want - rem) + 360) % 360;
    const target = base + diff;

    const startDeg = deg;
    const deltaDeg = target - startDeg;
    const t0 = performance.now();

    whoosh();

    /* cancel any lingering raf */
    if(rafId) cancelAnimationFrame(rafId);

    function tick(now){
      const elapsed = now - t0;
      const p = Math.min(elapsed/dur, 1);
      const e = easeOutCubic(p);
      const cur = startDeg + deltaDeg * e;

      coin.style.transform = `rotateY(${cur}deg)`;

      /* shadow squish/stretch */
      const pulse = Math.sin(p * Math.PI);
      shadow.style.opacity      = (0.35 + pulse*0.35).toFixed(3);
      shadow.style.transform    = `scaleX(${(0.5 + pulse*0.65).toFixed(3)})`;

      if(p < 1){
        rafId = requestAnimationFrame(tick);
      } else {
        /* lock exact value */
        coin.style.transform = `rotateY(${target}deg)`;
        deg = target;
        shadow.style.opacity   = '0.5';
        shadow.style.transform = 'scaleX(1)';

        clink();
        doBounce(target, ()=>{
          /* show result */
          if(result==='head'){
            rText.textContent='Heads';
            rText.className='result-text show gold';
            nH++; sH.textContent=nH;
          } else {
            rText.textContent='Tails';
            rText.className='result-text show silver';
            nT++; sT.textContent=nT;
          }
          busy=false;
          btn.disabled=false;
        });
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  /* bounce: vertical translateY sequence */
  function doBounce(fixedDeg, cb){
    const frames=[0,-16,0,-7,0,-3,0];
    const gaps  =[  70, 70, 55, 55, 40, 40];
    let i=0;
    function next(){
      coin.style.transform=`rotateY(${fixedDeg}deg) translateY(${frames[i]}px)`;
      i++;
      if(i<frames.length) setTimeout(next, gaps[i-1]);
      else cb();
    }
    next();
  }

  btn.onclick = flip;
  document.addEventListener('keydown', e=>{
    if(e.code==='Space'){ e.preventDefault(); flip(); }
  });

})();
</script>
</body>
</html>
